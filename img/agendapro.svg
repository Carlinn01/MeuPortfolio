  <text x="84" y="155" font-family="Inter, sans-serif" font-size="11" fill="#71717A">Hoje</text>
  <text x="84" y="185" font-family="Inter, sans-serif" font-size="28" font-weight="800" fill="#F0F0F2">8</text>
  <text x="84" y="204" font-family="Inter, sans-serif" font-size="10" fill="#52525B">agendamentos</text>

  <rect x="320" y="128" width="244" height="88" rx="12" fill="url(#card)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="344" y="155" font-family="Inter, sans-serif" font-size="11" fill="#71717A">Esta semana</text>
  <text x="344" y="185" font-family="Inter, sans-serif" font-size="28" font-weight="800" fill="#F0F0F2">34</text>
  <text x="344" y="204" font-family="Inter, sans-serif" font-size="10" fill="#52525B">agendamentos</text>


  <rect x="970" y="406" width="154" height="60" rx="8" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <text x="984" y="428" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#F0F0F2">Hidratação</text>

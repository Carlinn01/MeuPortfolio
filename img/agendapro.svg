<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F0F11"/>
      <stop offset="100%" style="stop-color:#141418"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1A1E"/>
      <stop offset="100%" style="stop-color:#131316"/>
    </linearGradient>
    <linearGradient id="accent-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7B61FF;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#7B61FF;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bg)"/>

  <!-- Subtle grid dots -->
  <pattern id="dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="1" fill="rgba(255,255,255,0.04)"/>
  </pattern>
  <rect width="1200" height="675" fill="url(#dots)"/>

  <!-- Accent glow top-left -->
  <ellipse cx="200" cy="180" rx="320" ry="220" fill="url(#accent-glow)"/>

  <!-- Nav bar mockup -->
  <rect x="60" y="50" width="1080" height="52" rx="12" fill="#0F0F11" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

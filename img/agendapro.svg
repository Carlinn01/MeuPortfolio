  <rect x="84" y="66" width="20" height="20" rx="5" fill="#7B61FF"/>
  <text x="112" y="80" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#F0F0F2">AgendaPro</text>
  <!-- Nav links -->
  <text x="650" y="80" font-family="Inter, sans-serif" font-size="11" fill="#71717A">Dashboard</text>

  <text x="830" y="80" font-family="Inter, sans-serif" font-size="11" fill="#71717A">Serviços</text>
  <!-- Nav badge -->
  <rect x="980" y="62" width="140" height="28" rx="8" fill="rgba(123,97,255,0.15)" stroke="rgba(123,97,255,0.3)" stroke-width="1"/>
  <text x="1050" y="80" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#7B61FF" text-anchor="middle">Painel Admin</text>

  <!-- Stats row -->
